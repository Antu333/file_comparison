<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeltaFile // Modern File Comparison</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/custom.css">
</head>

<body class="bg-light">

    <!-- Global Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-file-earmark-diff-fill me-2 text-primary"></i>
                <span class="fw-bold tracking-tight">DeltaFile</span>
                <span class="badge bg-secondary ms-2 version-badge">v1.0</span>
            </a>
        </div>
    </nav>

    <!-- Main Workspace -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-xl-10">

                <!-- Format Choice Tab Controls -->
                <ul class="nav nav-pills nav-fill p-2 bg-white rounded-4 shadow-sm mb-4" id="toolTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active rounded-3 py-2.5" id="docx-tab" data-bs-toggle="tab"
                            data-bs-target="#docx-pane" type="button" role="tab"><i
                                class="bi bi-filetype-docx me-2"></i>Word Docs</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link rounded-3 py-2.5" id="pdf-tab" data-bs-toggle="tab"
                            data-bs-target="#pdf-pane" type="button" role="tab"><i
                                class="bi bi-filetype-pdf me-2"></i>PDF Files</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link rounded-3 py-2.5" id="csv-tab" data-bs-toggle="tab"
                            data-bs-target="#csv-pane" type="button" role="tab"><i
                                class="bi bi-filetype-csv me-2"></i>CSV Datasets</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link rounded-3 py-2.5" id="excel-tab" data-bs-toggle="tab"
                            data-bs-target="#excel-pane" type="button" role="tab"><i
                                class="bi bi-filetype-xlsx me-2"></i>Excel Sheets</button>
                    </li>
                </ul>

                <!-- Multi-Format View Content -->
                <div class="tab-content" id="toolTabsContent">

                    <!-- DOCX TOOLSPACE -->
                    <div class="tab-pane fade show active" id="docx-pane" role="tabpanel" aria-labelledby="docx-tab">
                        <div class="card border-0 shadow-sm rounded-4 p-4">
                            <h4 class="fw-bold mb-3 text-dark">Compare DOCX Documents</h4>
                            <form id="docxForm" class="compare-form" data-endpoint="/api/v1/docx">
                                <div class="row g-3 mb-4">
                                    <div class="col-md-6">
                                        <div
                                            class="dropzone-area p-4 rounded-3 text-center border border-2 border-dashed bg-light position-relative">
                                            <i class="bi bi-cloud-arrow-up display-5 text-muted mb-2 d-block"></i>
                                            <span class="text-secondary small">Base Document (File 1)</span>
                                            <input type="file" name="file1" class="form-control mt-2" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div
                                            class="dropzone-area p-4 rounded-3 text-center border border-2 border-dashed bg-light position-relative">
                                            <i class="bi bi-cloud-arrow-up display-5 text-muted mb-2 d-block"></i>
                                            <span class="text-secondary small">Revised Document (File 2)</span>
                                            <input type="file" name="file2" class="form-control mt-2" required>
                                        </div>
                                    </div>
                                </div>
                                <div class="d-flex justify-content-end gap-2">
                                    <button type="submit" data-action="/compare"
                                        class="btn btn-primary px-4 py-2 rounded-3"><i
                                            class="bi bi-lightning-charge me-1"></i> Compute Diff</button>
                                    <button type="submit" data-action="/summary"
                                        class="btn btn-purple px-4 py-2 rounded-3 text-white"
                                        style="background-color: #6f42c1;"><i class="bi bi-stars me-1"></i> AI
                                        Summary</button>
                                </div>
                            </form>
                            <!-- Dynamic Injection Target for Results -->
                            <div class="result-box mt-4 d-none"></div>
                        </div>
                    </div>

                    <!-- PDF TOOLSPACE -->
                    <div class="tab-pane fade" id="pdf-pane" role="tabpanel" aria-labelledby="pdf-tab">
                        <div class="card border-0 shadow-sm rounded-4 p-4">
                            <h4 class="fw-bold mb-3 text-dark">Compare PDF Documents</h4>
                            <form id="pdfForm" class="compare-form" data-endpoint="/api/v1/pdf">
                                <div class="row g-3 mb-4">
                                    <div class="col-md-6">
                                        <div
                                            class="dropzone-area p-4 rounded-3 text-center border border-2 border-dashed bg-light">
                                            <i class="bi bi-file-earmark-pdf display-5 text-muted mb-2 d-block"></i>
                                            <span class="text-secondary small">Original PDF</span>
                                            <input type="file" name="file1" class="form-control mt-2" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div
                                            class="dropzone-area p-4 rounded-3 text-center border border-2 border-dashed bg-light">
                                            <i class="bi bi-file-earmark-pdf display-5 text-muted mb-2 d-block"></i>
                                            <span class="text-secondary small">New PDF</span>
                                            <input type="file" name="file2" class="form-control mt-2" required>
                                        </div>
                                    </div>
                                </div>
                                <div class="d-flex justify-content-end gap-2">
                                    <button type="submit" data-action="/compare"
                                        class="btn btn-primary px-4 py-2 rounded-3">Compute Diff</button>
                                    <button type="submit" data-action="/summary"
                                        class="btn btn-purple px-4 py-2 rounded-3 text-white"
                                        style="background-color: #6f42c1;"><i class="bi bi-stars me-1"></i> AI
                                        Summary</button>
                                </div>
                            </form>
                            <div class="result-box mt-4 d-none"></div>
                        </div>
                    </div>

                    <!-- CSV TOOLSPACE -->
                    <div class="tab-pane fade" id="csv-pane" role="tabpanel" aria-labelledby="csv-tab">
                        <div class="card border-0 shadow-sm rounded-4 p-4">
                            <h4 class="fw-bold mb-3 text-dark">Analyze CSV Datasets</h4>
                            <form id="csvForm" class="compare-form" data-endpoint="/api/v1/csv">
                                <div class="row g-3 mb-3">
                                    <div class="col-md-6"><input type="file" name="file1" class="form-control" required>
                                    </div>
                                    <div class="col-md-6"><input type="file" name="file2" class="form-control" required>
                                    </div>
                                </div>
                                <div class="row mb-4 align-items-center">
                                    <div class="col-md-6">
                                        <label class="form-label small fw-semibold text-muted">Key Row Identifier
                                            Column</label>
                                        <input type="text" name="key_column" class="form-control"
                                            placeholder="e.g., id, sl_no" value="sl no">
                                    </div>
                                </div>
                                <div class="d-flex justify-content-end gap-2">
                                    <button type="submit" data-action="/compare/symmetric"
                                        class="btn btn-outline-primary px-3 py-2 rounded-3">Symmetric Diff</button>
                                    <button type="submit" data-action="/compare/asymmetric"
                                        class="btn btn-primary px-3 py-2 rounded-3">Asymmetric Comparison</button>
                                    <button type="submit" data-action="/summary"
                                        class="btn text-white px-3 py-2 rounded-3" style="background-color: #6f42c1;"><i
                                            class="bi bi-stars me-1"></i> AI Summary</button>
                                </div>
                            </form>
                            <div class="result-box mt-4 d-none"></div>
                        </div>
                    </div>

                    <!-- EXCEL TOOLSPACE -->
                    <div class="tab-pane fade" id="excel-pane" role="tabpanel" aria-labelledby="excel-tab">
                        <div class="card border-0 shadow-sm rounded-4 p-4">
                            <h4 class="fw-bold mb-3 text-dark">Compare Excel Spreadsheets</h4>
                            <form id="excelForm" class="compare-form" data-endpoint="/api/v1/excel">
                                <div class="row g-3 mb-3">
                                    <div class="col-md-6"><input type="file" name="file1" class="form-control" required>
                                    </div>
                                    <div class="col-md-6"><input type="file" name="file2" class="form-control" required>
                                    </div>
                                </div>
                                <div class="row mb-4">
                                    <div class="col-md-6">
                                        <label class="form-label small fw-semibold text-muted">Merge Column Key</label>
                                        <input type="text" name="merge_on_column" class="form-control" value="sl no">
                                    </div>
                                </div>
                                <div class="d-flex justify-content-end gap-2">
                                    <button type="submit" data-action="/compare" data-is-file="true"
                                        class="btn btn-primary px-4 py-2 rounded-3"><i class="bi bi-download me-1"></i>
                                        Run & Download Workbook</button>
                                    <button type="submit" data-action="/summary"
                                        class="btn text-white px-4 py-2 rounded-3" style="background-color: #6f42c1;"><i
                                            class="bi bi-stars me-1"></i> AI Summary</button>
                                </div>
                            </form>
                            <div class="result-box mt-4 d-none"></div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>
    <!-- Add this before your app.js script -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>

</html>
